<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 130">
  <!-- Head small -->
  <ellipse cx="55" cy="13" rx="13" ry="13" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <!-- Neck -->
  <line x1="49" y1="25" x2="49" y2="34" stroke="#94A3B8" stroke-width="2"/>
  <line x1="61" y1="25" x2="61" y2="34" stroke="#94A3B8" stroke-width="2"/>
  <!-- Left shoulder slope -->
  <path d="M49,34 Q30,38 14,48" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <!-- Left arm outer -->
  <path d="M14,48 Q9,65 11,100" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <!-- Left armpit / torso side -->
  <path d="M24,52 Q20,70 22,115" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <!-- Right shoulder slope -->
  <path d="M61,34 Q80,38 96,48" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <!-- Right arm outer -->
  <path d="M96,48 Q101,65 99,100" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <!-- Right armpit / torso side -->
  <path d="M86,52 Q90,70 88,115" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <!-- Bottom -->
  <line x1="22" y1="115" x2="88" y2="115" stroke="#94A3B8" stroke-width="2"/>
  <!-- Measurement line at chest/armpit level -->
  <line x1="4" y1="60" x2="106" y2="60" stroke="#6366F1" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- End caps -->
  <line x1="4" y1="55" x2="4" y2="65" stroke="#6366F1" stroke-width="2.5"/>
  <line x1="106" y1="55" x2="106" y2="65" stroke="#6366F1" stroke-width="2.5"/>
  <!-- Contact dots (at torso sides, armpit level) -->
  <circle cx="22" cy="60" r="2.5" fill="#6366F1"/>
  <circle cx="88" cy="60" r="2.5" fill="#6366F1"/>
</svg>
