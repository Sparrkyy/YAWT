<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <!-- Head -->
  <ellipse cx="50" cy="24" rx="18" ry="22" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <!-- Neck left -->
  <line x1="40" y1="44" x2="40" y2="76" stroke="#94A3B8" stroke-width="2"/>
  <!-- Neck right -->
  <line x1="60" y1="44" x2="60" y2="76" stroke="#94A3B8" stroke-width="2"/>
  <!-- Left shoulder slope -->
  <path d="M40,76 Q22,81 10,96" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <!-- Right shoulder slope -->
  <path d="M60,76 Q78,81 90,96" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <!-- Measurement line at mid-neck (below larynx) -->
  <line x1="20" y1="62" x2="80" y2="62" stroke="#6366F1" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- End caps -->
  <line x1="20" y1="57" x2="20" y2="67" stroke="#6366F1" stroke-width="2.5"/>
  <line x1="80" y1="57" x2="80" y2="67" stroke="#6366F1" stroke-width="2.5"/>
  <!-- Contact dots -->
  <circle cx="40" cy="62" r="2.5" fill="#6366F1"/>
  <circle cx="60" cy="62" r="2.5" fill="#6366F1"/>
</svg>
