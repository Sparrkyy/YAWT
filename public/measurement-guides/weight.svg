<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110">
  <!-- Scale platform -->
  <rect x="8" y="50" width="84" height="50" rx="12" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <!-- Display window -->
  <rect x="26" y="60" width="48" height="18" rx="4" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  <!-- Display bars (stylized readout) -->
  <line x1="35" y1="66" x2="46" y2="66" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="35" y1="71" x2="46" y2="71" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="52" y1="66" x2="65" y2="66" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="52" y1="71" x2="65" y2="71" stroke="#94A3B8" stroke-width="1.5"/>
  <!-- Left foot (oval) standing on scale -->
  <ellipse cx="33" cy="50" rx="12" ry="7" fill="none" stroke="#6366F1" stroke-width="2"/>
  <!-- Right foot (oval) -->
  <ellipse cx="67" cy="50" rx="12" ry="7" fill="none" stroke="#6366F1" stroke-width="2"/>
  <!-- Person legs (simple lines) -->
  <line x1="33" y1="43" x2="33" y2="10" stroke="#94A3B8" stroke-width="2"/>
  <line x1="67" y1="43" x2="67" y2="10" stroke="#94A3B8" stroke-width="2"/>
  <!-- Body torso above legs -->
  <path d="M33,10 Q28,4 38,2 Q50,0 62,2 Q72,4 67,10" fill="none" stroke="#94A3B8" stroke-width="2"/>
</svg>
