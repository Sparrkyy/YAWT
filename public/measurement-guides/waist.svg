<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140">
  <!-- Torso segment showing waist narrowing -->
  <!-- Left side: wider chest tapering to waist then slightly wider at hips -->
  <path d="M14,8 Q10,28 12,52 Q14,72 20,112" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <!-- Right side mirror -->
  <path d="M86,8 Q90,28 88,52 Q86,72 80,112" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <!-- Top crop -->
  <line x1="14" y1="8" x2="86" y2="8" stroke="#94A3B8" stroke-width="2"/>
  <!-- Bottom crop -->
  <line x1="20" y1="112" x2="80" y2="112" stroke="#94A3B8" stroke-width="2"/>
  <!-- Waist measurement at narrowest point (y=58) -->
  <line x1="2" y1="58" x2="98" y2="58" stroke="#6366F1" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- End caps -->
  <line x1="2" y1="53" x2="2" y2="63" stroke="#6366F1" stroke-width="2.5"/>
  <line x1="98" y1="53" x2="98" y2="63" stroke="#6366F1" stroke-width="2.5"/>
  <!-- Contact dots at narrowest waist -->
  <circle cx="12" cy="58" r="2.5" fill="#6366F1"/>
  <circle cx="88" cy="58" r="2.5" fill="#6366F1"/>
</svg>
